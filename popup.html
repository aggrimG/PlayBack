<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 15px 20px;
      font-family: 'Poppins', sans-serif;
      background-color: #121212; 
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h3 {
      margin: 0 0 15px 0;
      font-size: 14px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .controls-container {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 15px;
    }

    input[type=range] {
      -webkit-appearance: none;
      flex-grow: 1;
      background: transparent;
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #333333;
      border-radius: 5px;
    }

    input[type=range]::-webkit-slider-thumb {
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background-color: #34cceb; 
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -7px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
      
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M8 5v14l11-7z"/></svg>');
      background-size: 60%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    #speedInput {
      width: 50px;
      background: #222222;
      color: #00e5ff;
      border: 1px solid #444444;
      border-radius: 4px;
      padding: 4px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
    }

    #speedInput:focus {
      outline: none;
      border-color: #00e5ff;
    }

    .multiplier {
      color: #777777;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h3>Playback Speed</h3>
  
  <div class="controls-container">
    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1.0">
    
    <div class="input-wrapper">
      <input type="number" id="speedInput" min="0.1" max="16" step="0.1" value="1.0">
      <span class="multiplier">x</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
